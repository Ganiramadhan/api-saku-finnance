host: localhost:4000
info:
  contact:
    name: API Support
  description: Minimal, production-ready Go API starter built with Fiber, GORM, JWT,
    and S3-compatible object storage.
  termsOfService: http://swagger.io/terms/
  title: Starter Go API
  version: "1.0"
paths:
  /api/v1/admin/users:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Search by name or email
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.UserResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List users (admin)
      tags:
      - Users
    post:
      consumes:
      - application/json
      parameters:
      - description: User data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.UserResponse'
              type: object
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Create user (admin)
      tags:
      - Users
  /api/v1/admin/users/{id}:
    delete:
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete user (admin)
      tags:
      - Users
    get:
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.UserResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID (admin)
      tags:
      - Users
    put:
      consumes:
      - application/json
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      - description: User data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.UserResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Update user (admin)
      tags:
      - Users
  /api/v1/ai-logs:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.AIProcessingLogResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List my AI processing logs
      tags:
      - AI Logs
    post:
      consumes:
      - application/json
      parameters:
      - description: AI log payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.CreateAILogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.AIProcessingLogResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Record AI processing result
      tags:
      - AI Logs
  /api/v1/ai-logs/attachment/{attachment_id}:
    get:
      parameters:
      - description: Attachment UUID
        in: path
        name: attachment_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.AIProcessingLogResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Get AI log for an attachment
      tags:
      - AI Logs
  /api/v1/ai/categorize:
    post:
      consumes:
      - application/json
      description: Uses Claude Sonnet 4 to extract amount, merchant, category & type
        from free-form text.
      parameters:
      - description: OCR text + optional user categories
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.CategorizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.CategorizeResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ganiramadhan_starter-go_internal_dto.APIResponse'
        "500":
