# ─────────────────────────────────────────────────────────────────────────────
# Starter Go API — local stack: postgres + redis + minio + api
#
# Usage:
#   docker compose up -d              # start everything
#   docker compose up -d postgres redis minio minio-init   # deps only
#   docker compose logs -f api        # tail API logs
#   docker compose down -v            # stop + WIPE volumes
# ─────────────────────────────────────────────────────────────────────────────

name: starter-go

services:
  postgres:
    image: postgres:16-alpine
    container_name: starter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-starter}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-starter}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7-alpine
    container_name: starter-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  minio:
    image: minio/minio:latest
    container_name: starter-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  # One-shot job: ensures the bucket exists on first boot.
  minio-init:
    image: minio/mc:latest
    container_name: starter-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${AWS_BUCKET:-starter} &&
      echo 'minio: bucket ${AWS_BUCKET:-starter} ready'
      "
    networks: [backend]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    image: starter-go:${VERSION:-dev}
    container_name: starter-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - envs/.env
    # Override host names so the container reaches sibling services by DNS.
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    ports:
      - "${APP_PORT:-4000}:4000"
    networks: [backend]

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  backend:
    driver: bridge
