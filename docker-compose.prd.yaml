services:
  api-saku-finance:
    image: ${IMAGE_FULL}
    container_name: ${APP_NAME:-api-saku-finance}
    restart: ${RESTART_POLICY:-unless-stopped}
    env_file:
      - ${SERVICE_ENV_FILE:-.env}
    expose:
      - "${APP_PORT:-4001}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:$${APP_PORT:-4001}/health\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      service: api-saku-finance
      app: saku-finance
    networks:
      saku-finance:
        aliases:
          - ${NETWORK_ALIAS:-api-saku-finance}

networks:
  saku-finance:
    external: true
    name: ${DOCKER_NETWORK:-saku-finance}
